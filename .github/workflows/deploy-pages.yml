name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build PWA
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          VITE_APP_URL: https://raw.githack.com/shallower-yin/semester-schedule-pwa/app-mirror/index.html
          VITE_APP_MIRROR_URL: https://raw.githack.com/shallower-yin/semester-schedule-pwa/app-mirror/index.html
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Build no-proxy mirror
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          VITE_APP_BASE: /shallower-yin/semester-schedule-pwa/app-mirror/
          VITE_APP_START_URL: /shallower-yin/semester-schedule-pwa/app-mirror/index.html
          VITE_APP_URL: https://raw.githack.com/shallower-yin/semester-schedule-pwa/app-mirror/index.html
          VITE_APP_MIRROR_URL: https://raw.githack.com/shallower-yin/semester-schedule-pwa/app-mirror/index.html
          VITE_OUT_DIR: dist-mirror
        run: npm run build

      - name: Deploy no-proxy mirror
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: app-mirror
          publish_dir: ./dist-mirror
          force_orphan: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
