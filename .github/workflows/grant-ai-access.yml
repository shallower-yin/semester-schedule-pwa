name: Grant AI access

on:
  workflow_dispatch:
    inputs:
      target_user_id:
        description: "Optional Supabase user UUID, takes precedence when set"
        required: false
        type: string
      target_email:
        description: "Optional account email, used when UUID is empty"
        required: false
        type: string
      role:
        description: "Access role"
        required: true
        default: "member"
        type: choice
        options:
          - member
          - admin
      enabled:
        description: "Enable access"
        required: true
        default: true
        type: boolean
      expires_at:
        description: "Optional ISO timestamp, empty means no expiry"
        required: false
        type: string
      note:
        description: "Optional admin note"
        required: false
        type: string

permissions:
  contents: read

jobs:
  grant:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: haifsnaupqhlvgfoyvlc
      TARGET_USER_ID: ${{ inputs.target_user_id }}
      TARGET_EMAIL: ${{ inputs.target_email }}
      ACCESS_ROLE: ${{ inputs.role }}
      ACCESS_ENABLED: ${{ inputs.enabled }}
      ACCESS_EXPIRES_AT: ${{ inputs.expires_at }}
      ACCESS_NOTE: ${{ inputs.note }}
    steps:
      - name: Build query
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import uuid

          target_user_id = os.environ.get("TARGET_USER_ID", "").strip()
          target_email = os.environ.get("TARGET_EMAIL", "").strip()
          role = os.environ["ACCESS_ROLE"].strip()
          enabled = os.environ["ACCESS_ENABLED"].strip().lower() == "true"
          expires_at = os.environ.get("ACCESS_EXPIRES_AT", "").strip() or None
          note = os.environ.get("ACCESS_NOTE", "").strip() or None

          if not target_user_id and not target_email:
            raise ValueError("target_user_id or target_email is required")
          if target_user_id:
            uuid.UUID(target_user_id)
          if role not in {"member", "admin"}:
            raise ValueError("role must be member or admin")

          def literal(value):
            if value is None:
              return "null"
            return "'" + value.replace("'", "''") + "'"

          target_user_id_expr = f"{literal(target_user_id)}::uuid" if target_user_id else "null::uuid"
          target_email_expr = literal(target_email) if target_email else "null"
          query = f"""
          with target as (
            select coalesce(
              {target_user_id_expr},
              (
                select auth_user.id
                from auth.users as auth_user
                where lower(auth_user.email) = lower({target_email_expr})
                order by auth_user.created_at desc
                limit 1
              )
            ) as user_id
          )
          insert into public.ai_assistant_access (user_id, enabled, role, expires_at, note, updated_at)
          select
            target.user_id,
            {'true' if enabled else 'false'},
            {literal(role)},
            {literal(expires_at)}::timestamptz,
            {literal(note)},
            now()
          from target
          where target.user_id is not null
          on conflict (user_id) do update set
            enabled = excluded.enabled,
            role = excluded.role,
            expires_at = excluded.expires_at,
            note = excluded.note,
            updated_at = now()
          returning user_id, enabled, role, expires_at, note;
          """
          with open("/tmp/grant-ai-access-query.json", "w", encoding="utf-8") as handle:
            json.dump({"query": query}, handle)
          PY

      - name: Grant access
        run: |
          set -euo pipefail
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/grant-ai-access-query.json \
            --output /tmp/grant-ai-access-response.json
          jq -e --arg role "$ACCESS_ROLE" --arg enabled "$ACCESS_ENABLED" '
            length == 1
            and .[0].role == $role
            and (.[0].enabled | tostring) == ($enabled | ascii_downcase)
          ' /tmp/grant-ai-access-response.json > /dev/null || {
            echo "Grant failed: no matching user was found, or the returned access state did not match the requested state." >&2
            exit 1
          }
