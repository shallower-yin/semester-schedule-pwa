name: Deploy Supabase auth email templates

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/templates/**"
      - ".github/workflows/deploy-supabase-auth.yml"

permissions:
  contents: read

concurrency:
  group: supabase-auth-email-templates
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: haifsnaupqhlvgfoyvlc
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      TEMPLATE_FILE: supabase/templates/magic-link-otp.html
      TEMPLATE_SUBJECT: 日程计划表登录验证码
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate OTP-only template
        run: |
          test -s "$TEMPLATE_FILE"
          grep --quiet --fixed-strings '{{ .Token }}' "$TEMPLATE_FILE"
          if grep --quiet --fixed-strings '{{ .ConfirmationURL }}' "$TEMPLATE_FILE"; then
            echo "Auth email template must not contain a browser sign-in link."
            exit 1
          fi

      - name: Deploy passwordless email OTP template
        run: |
          jq --null-input \
            --arg subject "$TEMPLATE_SUBJECT" \
            --rawfile content "$TEMPLATE_FILE" \
            '{
              mailer_subjects_magic_link: $subject,
              mailer_templates_magic_link_content: $content
            }' > /tmp/auth-template-payload.json

          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/config/auth" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/auth-template-payload.json \
            --output /tmp/auth-template-update-response.json

      - name: Verify hosted template
        run: |
          curl --fail-with-body --silent --show-error \
            --request GET \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/config/auth" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --output /tmp/auth-config.json

          jq --exit-status \
            --arg subject "$TEMPLATE_SUBJECT" \
            --rawfile content "$TEMPLATE_FILE" \
            '.mailer_subjects_magic_link == $subject
             and .mailer_templates_magic_link_content == $content' \
            /tmp/auth-config.json > /dev/null

          echo "Hosted passwordless email template matches the reviewed OTP template."
