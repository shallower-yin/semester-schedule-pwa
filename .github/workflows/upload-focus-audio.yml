name: Upload focus audio

on:
  workflow_dispatch:
    inputs:
      release_asset_id:
        description: Asset ID from the temporary prerelease
        required: true
        type: string
      kind:
        description: Focus audio category
        required: true
        default: music
        type: choice
        options:
          - music
          - white_noise

permissions:
  contents: read

concurrency:
  group: focus-audio-upload
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_ASSET_ID: ${{ inputs.release_asset_id }}
      AUDIO_KIND: ${{ inputs.kind }}
      SUPABASE_URL: https://haifsnaupqhlvgfoyvlc.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Download temporary release assets
        run: |
          mkdir -p "$RUNNER_TEMP/focus-audio-assets"
          gh api \
            --header "Accept: application/octet-stream" \
            "repos/$GITHUB_REPOSITORY/releases/assets/$RELEASE_ASSET_ID" \
            > "$RUNNER_TEMP/focus-audio-assets/focus-audio-upload.zip"

      - name: Extract audio archives
        env:
          ASSET_DIR: ${{ runner.temp }}/focus-audio-assets
        run: |
          find "$ASSET_DIR" -maxdepth 1 -type f -name '*.zip' -print0 | while IFS= read -r -d '' archive; do
            unzip -q "$archive" -d "$ASSET_DIR"
            rm -f "$archive"
          done

      - name: Upload audio files to Supabase Storage
        env:
          ASSET_DIR: ${{ runner.temp }}/focus-audio-assets
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { readFile, readdir } from "node:fs/promises";
          import { basename, extname, join } from "node:path";

          const required = (name) => {
            const value = process.env[name]?.trim();
            if (!value) throw new Error(`Missing required environment variable: ${name}`);
            return value;
          };

          const assetDir = required("ASSET_DIR");
          const kind = required("AUDIO_KIND");
          const supabaseUrl = required("SUPABASE_URL").replace(/\/$/, "");
          const serviceRoleKey = required("SUPABASE_SERVICE_ROLE_KEY");
          const mimeTypes = new Map([
            [".mp3", "audio/mpeg"],
            [".m4a", "audio/mp4"],
            [".mp4", "audio/mp4"],
            [".ogg", "audio/ogg"],
            [".wav", "audio/wav"],
            [".webm", "audio/webm"]
          ]);
          const headers = {
            apikey: serviceRoleKey,
            Authorization: `Bearer ${serviceRoleKey}`
          };
          const directoryEntries = (await readdir(assetDir, { withFileTypes: true }))
            .filter((entry) => entry.isFile())
            .map((entry) => entry.name);
          const manifestName = "focus-audio-manifest.json";
          const titleByDigest = directoryEntries.includes(manifestName)
            ? JSON.parse(await readFile(join(assetDir, manifestName), "utf8"))
            : {};
          const files = directoryEntries.filter((fileName) => mimeTypes.has(extname(fileName).toLowerCase()));
          if (!files.length) throw new Error("The draft release contains no files.");

          for (const fileName of files) {
            const extension = extname(fileName).toLowerCase();
            const mimeType = mimeTypes.get(extension);
            if (!mimeType) throw new Error(`Unsupported audio format: ${fileName}`);
            const body = await readFile(join(assetDir, fileName));
            if (body.byteLength > 50 * 1024 * 1024) throw new Error(`Audio file exceeds 50 MB: ${fileName}`);

            const digest = createHash("sha256").update(body).digest("hex");
            const storagePath = `${kind}/${digest}${extension}`;
            const title = typeof titleByDigest[digest] === "string" && titleByDigest[digest].trim()
              ? titleByDigest[digest].trim()
              : basename(fileName, extension).trim();
            const query = new URLSearchParams({
              select: "id,title",
              storage_path: `eq.${storagePath}`,
              limit: "1"
            });
            const existingResponse = await fetch(`${supabaseUrl}/rest/v1/focus_audio_tracks?${query}`, { headers });
            if (!existingResponse.ok) throw new Error(`Could not check ${fileName}: ${await existingResponse.text()}`);
            const existingTracks = await existingResponse.json();
            if (existingTracks.length) {
              if (existingTracks[0].title !== title) {
                const updateResponse = await fetch(`${supabaseUrl}/rest/v1/focus_audio_tracks?id=eq.${existingTracks[0].id}`, {
                  method: "PATCH",
                  headers: { ...headers, "Content-Type": "application/json", Prefer: "return=minimal" },
                  body: JSON.stringify({ title, is_enabled: true })
                });
                if (!updateResponse.ok) throw new Error(`Could not update ${fileName}: ${await updateResponse.text()}`);
                console.log(`Updated title: ${fileName} -> ${title}`);
              }
              console.log(`Skipped existing file: ${fileName}`);
              continue;
            }

            const uploadResponse = await fetch(`${supabaseUrl}/storage/v1/object/focus-audio/${storagePath}`, {
              method: "POST",
              headers: { ...headers, "Content-Type": mimeType, "x-upsert": "false" },
              body
            });
            if (!uploadResponse.ok) throw new Error(`Storage upload failed for ${fileName}: ${await uploadResponse.text()}`);

            const metadataResponse = await fetch(`${supabaseUrl}/rest/v1/focus_audio_tracks`, {
              method: "POST",
              headers: { ...headers, "Content-Type": "application/json", Prefer: "return=minimal" },
              body: JSON.stringify({
                title,
                kind,
                storage_path: storagePath,
                mime_type: mimeType,
                file_size: body.byteLength,
                is_enabled: true
              })
            });
            if (!metadataResponse.ok) {
              await fetch(`${supabaseUrl}/storage/v1/object/focus-audio`, {
                method: "DELETE",
                headers: { ...headers, "Content-Type": "application/json" },
                body: JSON.stringify({ prefixes: [storagePath] })
              });
              throw new Error(`Metadata insert failed for ${fileName}: ${await metadataResponse.text()}`);
            }
            console.log(`Uploaded: ${fileName} -> ${storagePath}`);
          }
          NODE
