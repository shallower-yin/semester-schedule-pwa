name: Smoke test AI access

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://haifsnaupqhlvgfoyvlc.supabase.co
      PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AI_ASSISTANT_ACCESS_CODE: ${{ secrets.AI_ASSISTANT_ACCESS_CODE }}
    steps:
      - name: Verify AI access roles
        run: |
          node <<'NODE'
          const crypto = require("node:crypto");

          const supabaseUrl = requiredEnv("SUPABASE_URL");
          const publishableKey = requiredEnv("PUBLISHABLE_KEY");
          const serviceRoleKey = requiredEnv("SERVICE_ROLE_KEY");
          const aiAccessCode = process.env.AI_ASSISTANT_ACCESS_CODE?.trim() || "";
          const runId = process.env.GITHUB_RUN_ID || Date.now().toString();
          const smokeEmail = `codex-ai-smoke-${runId}-${crypto.randomUUID().slice(0, 8)}@example.com`;

          function requiredEnv(name) {
            const value = process.env[name]?.trim();
            if (!value) throw new Error(`Missing required environment: ${name}`);
            return value;
          }

          function serviceHeaders(extra = {}) {
            return {
              apikey: serviceRoleKey,
              authorization: `Bearer ${serviceRoleKey}`,
              ...extra
            };
          }

          function publishableHeaders(extra = {}) {
            return {
              apikey: publishableKey,
              ...extra
            };
          }

          async function readJson(response) {
            const text = await response.text();
            try {
              return text ? JSON.parse(text) : null;
            } catch {
              return { raw: text };
            }
          }

          async function createSmokeUser() {
            const password = `${crypto.randomUUID()}Aa1!`;
            const response = await fetch(`${supabaseUrl}/auth/v1/admin/users`, {
              method: "POST",
              headers: serviceHeaders({ "content-type": "application/json" }),
              body: JSON.stringify({
                email: smokeEmail,
                password,
                email_confirm: true,
                user_metadata: { source: "codex-ai-access-smoke", runId }
              })
            });
            const payload = await readJson(response);
            if (!response.ok || !payload?.id) {
              throw new Error(`prepare smoke user failed: HTTP ${response.status} ${JSON.stringify(payload).slice(0, 300)}`);
            }
            return { id: payload.id, email: smokeEmail, password, label: "smoke" };
          }

          async function clearAccess(userId) {
            const response = await fetch(`${supabaseUrl}/rest/v1/ai_assistant_access?user_id=eq.${encodeURIComponent(userId)}`, {
              method: "DELETE",
              headers: serviceHeaders()
            });
            const payload = await readJson(response);
            if (!response.ok) {
              throw new Error(`clear smoke access failed: HTTP ${response.status} ${JSON.stringify(payload).slice(0, 300)}`);
            }
          }

          async function deleteSmokeUser(userId) {
            const response = await fetch(`${supabaseUrl}/auth/v1/admin/users/${encodeURIComponent(userId)}`, {
              method: "DELETE",
              headers: serviceHeaders()
            });
            const payload = await readJson(response);
            if (!response.ok) {
              throw new Error(`delete smoke user failed: HTTP ${response.status} ${JSON.stringify(payload).slice(0, 300)}`);
            }
          }

          async function getAssistantGlobalAccess() {
            const response = await fetch(`${supabaseUrl}/rest/v1/ai_assistant_settings?select=enabled_for_all,feature_quotas&id=eq.true&limit=1`, {
              headers: serviceHeaders()
            });
            const payload = await readJson(response);
            if (!response.ok) {
              throw new Error(`read AI settings failed: HTTP ${response.status} ${JSON.stringify(payload).slice(0, 300)}`);
            }
            const settings = Array.isArray(payload) ? payload[0] : null;
            return Boolean(settings?.feature_quotas?.assistant?.enabled_for_all ?? settings?.enabled_for_all);
          }

          async function signIn(user) {
            const response = await fetch(`${supabaseUrl}/auth/v1/token?grant_type=password`, {
              method: "POST",
              headers: publishableHeaders({ "content-type": "application/json" }),
              body: JSON.stringify({ email: user.email, password: user.password })
            });
            const payload = await readJson(response);
            if (!response.ok || !payload?.access_token) {
              throw new Error(`sign in ${user.label} failed: HTTP ${response.status} ${JSON.stringify(payload).slice(0, 300)}`);
            }
            return payload.access_token;
          }

          async function setAccess(user, { enabled, role, expiresAt = null }) {
            const response = await fetch(`${supabaseUrl}/rest/v1/ai_assistant_access?on_conflict=user_id`, {
              method: "POST",
              headers: serviceHeaders({
                "content-type": "application/json",
                prefer: "resolution=merge-duplicates,return=representation"
              }),
              body: JSON.stringify({
                user_id: user.id,
                enabled,
                role,
                expires_at: expiresAt,
                note: `smoke test ${role}`,
                updated_at: new Date().toISOString()
              })
            });
            const payload = await readJson(response);
            if (!response.ok) {
              throw new Error(`set ${role} access failed: HTTP ${response.status} ${JSON.stringify(payload).slice(0, 300)}`);
            }
          }

          async function invokeFunction(name, token, body) {
            const response = await fetch(`${supabaseUrl}/functions/v1/${name}`, {
              method: "POST",
              headers: publishableHeaders({
                authorization: `Bearer ${token}`,
                "content-type": "application/json"
              }),
              body: JSON.stringify(body)
            });
            return { status: response.status, payload: await readJson(response) };
          }

          function assert(condition, message) {
            if (!condition) throw new Error(message);
          }

          async function expectAiDenied(user, token) {
            const result = await invokeFunction("ai-assistant", token, {
              question: "今天有什么安排？",
              scheduleContext: { today: "2026-07-08" },
              history: []
            });
            assert(result.status === 403, `${user.label} should be denied by AI access gate, got HTTP ${result.status}`);
            assert(result.payload?.code === "AI_ACCESS_REQUIRED", `${user.label} denial should return AI_ACCESS_REQUIRED`);
            console.log(`PASS ${user.label}: AI denied`);
          }

          async function expectAiAllowed(user, token, expectedAccess) {
            const result = await invokeFunction("ai-assistant", token, {
              question: "请用一句话说明我当前没有提供具体日程。",
              scheduleContext: { today: "2026-07-08", upcomingDays: [] },
              history: []
            });
            assert(result.status === 200, `${user.label} should use AI, got HTTP ${result.status}: ${JSON.stringify(result.payload).slice(0, 300)}`);
            assert(typeof result.payload?.answer === "string" && result.payload.answer.trim(), `${user.label} should receive an AI answer`);
            assert(result.payload?.access === expectedAccess, `${user.label} access should be ${expectedAccess}, got ${result.payload?.access}`);
            console.log(`PASS ${user.label}: AI allowed as ${expectedAccess}`);
          }

          async function expectOrdinaryPolicy(user, token, enabledForAll) {
            if (enabledForAll) await expectAiAllowed(user, token, "ordinary");
            else await expectAiDenied(user, token);
          }

          async function expectInactiveDirectAccess(user, token, enabledForAll) {
            if (enabledForAll) {
              console.log(`PASS ${user.label}: inactive direct access falls back to verified ordinary policy`);
              return;
            }
            await expectAiDenied(user, token);
          }

          async function expectAiAccessCodeDoesNotGrantMembership(user, token, enabledForAll) {
            if (enabledForAll) {
              console.log("SKIP access-code smoke: ordinary assistant access is enabled globally");
              return;
            }
            if (!aiAccessCode) {
              console.log("SKIP access-code smoke: AI_ASSISTANT_ACCESS_CODE is not configured");
              return;
            }
            const result = await invokeFunction("ai-assistant", token, {
              question: "请用一句话说明我当前没有提供具体日程。",
              scheduleContext: { today: "2026-07-08", upcomingDays: [] },
              history: [],
              accessCode: aiAccessCode
            });
            assert(result.status === 200, `${user.label} should use AI with access code, got HTTP ${result.status}: ${JSON.stringify(result.payload).slice(0, 300)}`);
            assert(result.payload?.access === "access-code", `${user.label} access should be access-code, got ${result.payload?.access}`);
            assert(result.payload?.accessBound !== true, `${user.label} access code should not bind membership`);
            await expectAiDenied(user, token);
            console.log(`PASS ${user.label}: access code is temporary and does not grant membership`);
          }

          async function expectAdminStatus(user, token, expectedAdmin) {
            const whoami = await invokeFunction("admin", token, { action: "whoami" });
            assert(whoami.status === 200, `${user.label} whoami failed: HTTP ${whoami.status}`);
            assert(whoami.payload?.isAdmin === expectedAdmin, `${user.label} isAdmin should be ${expectedAdmin}`);
            const summary = await invokeFunction("admin", token, { action: "summary" });
            if (expectedAdmin) {
              assert(summary.status === 200, `${user.label} summary should be allowed, got HTTP ${summary.status}`);
              const firstUser = Array.isArray(summary.payload?.users) ? summary.payload.users[0] : null;
              if (firstUser?.aiUsage) {
                assert(typeof firstUser.aiUsage.today?.requestCount === "number", `${user.label} summary should include today's AI usage`);
                assert(typeof firstUser.aiUsage.month?.requestCount === "number", `${user.label} summary should include monthly AI usage`);
              }
            } else {
              assert(summary.status === 403, `${user.label} summary should be forbidden, got HTTP ${summary.status}`);
            }
            console.log(`PASS ${user.label}: admin access ${expectedAdmin ? "allowed" : "blocked"}`);
          }

          async function main() {
            let user = null;
            try {
              user = await createSmokeUser();
              const token = await signIn(user);
              const enabledForAll = await getAssistantGlobalAccess();

              await clearAccess(user.id);
              user.label = "normal";
              await expectOrdinaryPolicy(user, token, enabledForAll);
              await expectAdminStatus(user, token, false);
              await expectAiAccessCodeDoesNotGrantMembership(user, token, enabledForAll);

              user.label = "disabled";
              await setAccess(user, { enabled: false, role: "member" });
              await expectInactiveDirectAccess(user, token, enabledForAll);
              await expectAdminStatus(user, token, false);

              user.label = "expired";
              await setAccess(user, { enabled: true, role: "member", expiresAt: "2020-01-01T00:00:00Z" });
              await expectInactiveDirectAccess(user, token, enabledForAll);
              await expectAdminStatus(user, token, false);

              user.label = "member";
              await setAccess(user, { enabled: true, role: "member" });
              await expectAiAllowed(user, token, "member");
              await expectAdminStatus(user, token, false);

              user.label = "admin";
              await setAccess(user, { enabled: true, role: "admin" });
              await expectAiAllowed(user, token, "admin");
              await expectAdminStatus(user, token, true);
            } finally {
              if (user) {
                await deleteSmokeUser(user.id);
              }
            }
          }

          main()
            .catch((error) => {
              console.error(error);
              process.exitCode = 1;
            });
          NODE
