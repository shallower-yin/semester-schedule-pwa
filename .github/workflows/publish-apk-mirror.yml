name: Publish APK to app-hosting mirror

# Rebuilds the Android APK, publishes it to Supabase app-hosting, and updates
# release.json so in-app OTA update works without a PC cable.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android/app/build.gradle"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-apk-mirror.yml"

concurrency:
  group: publish-apk-mirror
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build Android web assets
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          VITE_APP_URL: https://shallower-yin.github.io/semester-schedule-pwa/
          VITE_APP_ASSET_MIRROR_URL: https://haifsnaupqhlvgfoyvlc.supabase.co/functions/v1/app-hosting/
        run: npm run build:android

      - name: Capacitor sync
        run: npx cap sync android

      # Must match the debug keystore already on phones (Studio AndroidUser cert 98e610ed…).
      # CI's default ~/.android/debug.keystore is a different key → INSTALL_FAILED_UPDATE_INCOMPATIBLE.
      - name: Restore fixed debug keystore
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_DEBUG_KEYSTORE_BASE64:-}" ]; then
            echo "::error::Missing secret ANDROID_DEBUG_KEYSTORE_BASE64 (base64 of the project debug.keystore)."
            exit 1
          fi
          mkdir -p "$HOME/.android"
          echo "$ANDROID_DEBUG_KEYSTORE_BASE64" | base64 -d > "$HOME/.android/debug.keystore"
          test -s "$HOME/.android/debug.keystore"
          echo "Restored debug.keystore ($(wc -c < "$HOME/.android/debug.keystore") bytes)"

      - name: Assemble debug APK
        working-directory: android
        run: |
          set -euo pipefail
          # Gradle debug signing uses ~/.android/debug.keystore (restored above).
          test -s "$HOME/.android/debug.keystore"
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --console=plain

      - name: Stage APK and checksum
        id: apk
        run: |
          set -euo pipefail
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          test -f "$SRC"
          # Fail the job if CI accidentally signed with the wrong cert (phone OTA would conflict).
          EXPECTED_CERT_SHA256="98e610edcfa3d9e4f34752da158ea48e48592f08481543ad0ac26f85294a3e24"
          CERT_LINE=$(keytool -printcert -jarfile "$SRC" 2>/dev/null | tr 'A-F' 'a-f' | tr -d ' :' | grep -i "sha256" | head -1 || true)
          echo "APK cert line: $CERT_LINE"
          if ! keytool -printcert -jarfile "$SRC" 2>/dev/null | tr 'A-F' 'a-f' | tr -d ' :\n' | grep -q "$EXPECTED_CERT_SHA256"; then
            echo "::error::APK signing cert does not match expected Studio debug cert ($EXPECTED_CERT_SHA256). Refusing to publish (would break in-place updates)."
            keytool -printcert -jarfile "$SRC" || true
            exit 1
          fi
          echo "APK signing cert OK ($EXPECTED_CERT_SHA256)"
          mkdir -p dist-mirror/android
          cp "$SRC" dist-mirror/android/semester-schedule.apk
          SHA=$(sha256sum dist-mirror/android/semester-schedule.apk | awk '{print tolower($1)}')
          CODE=$(python3 - <<'PY'
          import re
          text=open("android/app/build.gradle",encoding="utf-8").read()
          m=re.search(r"versionCode\s+(\d+)", text)
          print(m.group(1) if m else "")
          PY
          )
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "APK versionCode=$CODE sha256=$SHA size=$(wc -c < dist-mirror/android/semester-schedule.apk)"

      - name: Build mirror web package with APK metadata
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
          VITE_APP_BASE: /semester-schedule-pwa/
          VITE_APP_START_URL: /semester-schedule-pwa/
          VITE_APP_URL: https://shallower-yin.github.io/semester-schedule-pwa/
          VITE_APP_ASSET_MIRROR_URL: https://haifsnaupqhlvgfoyvlc.supabase.co/functions/v1/app-hosting/
          VITE_OUT_DIR: dist-mirror
          VITE_APK_VERSION_CODE: ${{ steps.apk.outputs.code }}
          VITE_APK_SHA256: ${{ steps.apk.outputs.sha }}
          VITE_APK_URL: https://haifsnaupqhlvgfoyvlc.supabase.co/functions/v1/app-hosting/android/semester-schedule.apk
        run: |
          set -euo pipefail
          # Preserve staged APK across vite clean of outDir
          cp dist-mirror/android/semester-schedule.apk /tmp/semester-schedule.apk
          npm run build
          mkdir -p dist-mirror/android
          cp /tmp/semester-schedule.apk dist-mirror/android/semester-schedule.apk
          test -f dist-mirror/android/semester-schedule.apk
          test -f dist-mirror/release.json
          python3 - <<'PY'
          import json, os
          path="dist-mirror/release.json"
          data=json.load(open(path,encoding="utf-8"))
          data["apkVersionCode"]=int(os.environ["VITE_APK_VERSION_CODE"])
          data["apkSha256"]=os.environ["VITE_APK_SHA256"]
          data["apkUrl"]=os.environ["VITE_APK_URL"]
          json.dump(data, open(path,"w",encoding="utf-8"), ensure_ascii=False, indent=2)
          open(path,"a",encoding="utf-8").write("\n")
          print(json.dumps({k:data.get(k) for k in ("version","apkVersionCode","apkUrl","apkSha256")}, ensure_ascii=False))
          PY

      - name: Deploy mirror (web + APK)
        env:
          SUPABASE_URL: https://haifsnaupqhlvgfoyvlc.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STATIC_SOURCE_DIR: dist-mirror
          VITE_APP_ASSET_MIRROR_URL: https://haifsnaupqhlvgfoyvlc.supabase.co/functions/v1/app-hosting/
        run: node scripts/deploy-static-mirror.mjs

      - name: Verify published APK
        run: |
          set -euo pipefail
          URL="https://haifsnaupqhlvgfoyvlc.supabase.co/functions/v1/app-hosting/android/semester-schedule.apk"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -I "$URL")
          echo "APK HEAD status=$code"
          test "$code" = "200"
          rel=$(curl -sS "https://haifsnaupqhlvgfoyvlc.supabase.co/functions/v1/app-hosting/release.json")
          echo "$rel" | python3 -c 'import sys,json; d=json.load(sys.stdin); assert int(d.get("apkVersionCode") or 0)>=13, d; print("release ok", d.get("version"), d.get("apkVersionCode"))'
