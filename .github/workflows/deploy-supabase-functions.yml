name: Deploy Supabase functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/configure-r2.mjs"
      - "scripts/r2-cors.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-supabase-functions.yml"

permissions:
  contents: read

concurrency:
  group: supabase-functions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: haifsnaupqhlvgfoyvlc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply AI feature quota migration
        env:
          MIGRATION_FILE: supabase/migrations/20260717_ai_feature_quotas.sql
        run: |
          jq -Rs '{query: .}' "$MIGRATION_FILE" > /tmp/ai-feature-quotas-query.json
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
              --data @/tmp/ai-feature-quotas-query.json

      - name: Apply AI call records and account migration
        env:
          MIGRATION_FILE: supabase/migrations/20260718_ai_call_records_and_accounts.sql
        run: |
          jq -Rs '{query: .}' "$MIGRATION_FILE" > /tmp/ai-call-records-query.json
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/ai-call-records-query.json

      - name: Configure function secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ vars.MIMO_BASE_URL }}
          MIMO_PAYG_API_KEY: ${{ secrets.MIMO_PAYG_API_KEY }}
          MIMO_PAYG_BASE_URL: ${{ vars.MIMO_PAYG_BASE_URL || 'https://api.xiaomimimo.com/v1' }}
          MIMO_TOKEN_PLAN_API_KEY: ${{ secrets.MIMO_TOKEN_PLAN_API_KEY }}
          MIMO_TOKEN_PLAN_BASE_URL: ${{ vars.MIMO_TOKEN_PLAN_BASE_URL || vars.MIMO_BASE_URL || 'https://token-plan-cn.xiaomimimo.com/v1' }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AI_ASSISTANT_ACCESS_CODE: ${{ secrets.AI_ASSISTANT_ACCESS_CODE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT: ${{ vars.AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT || '3' }}
          AI_ASSISTANT_ACCESS_CODE_WEEKLY_LIMIT: ${{ vars.AI_ASSISTANT_ACCESS_CODE_WEEKLY_LIMIT || '20' }}
          AI_ASSISTANT_MEMBER_DAILY_LIMIT: ${{ vars.AI_ASSISTANT_MEMBER_DAILY_LIMIT || '50' }}
          AI_ASSISTANT_MEMBER_WEEKLY_LIMIT: ${{ vars.AI_ASSISTANT_MEMBER_WEEKLY_LIMIT || '300' }}
          AI_MAX_DOCUMENT_PAGES: ${{ vars.AI_MAX_DOCUMENT_PAGES || '120' }}
        run: |
          supabase secrets set --project-ref "$PROJECT_REF" \
            REMINDER_DISPATCHER_TOKEN="${{ secrets.REMINDER_DISPATCHER_TOKEN }}" \
            VAPID_PUBLIC_KEY="${{ vars.VITE_VAPID_PUBLIC_KEY }}" \
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
            APP_URL="https://shallower-yin.github.io/semester-schedule-pwa/" \
            AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT="$AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT" \
            AI_ASSISTANT_ACCESS_CODE_WEEKLY_LIMIT="$AI_ASSISTANT_ACCESS_CODE_WEEKLY_LIMIT" \
            AI_ASSISTANT_MEMBER_DAILY_LIMIT="$AI_ASSISTANT_MEMBER_DAILY_LIMIT" \
            AI_ASSISTANT_MEMBER_WEEKLY_LIMIT="$AI_ASSISTANT_MEMBER_WEEKLY_LIMIT" \
            AI_MAX_DOCUMENT_PAGES="$AI_MAX_DOCUMENT_PAGES" \
            MIMO_PAYG_BASE_URL="$MIMO_PAYG_BASE_URL" \
            MIMO_TOKEN_PLAN_BASE_URL="$MIMO_TOKEN_PLAN_BASE_URL"
          supabase secrets set --project-ref "$PROJECT_REF" DEEPSEEK_MODEL="${DEEPSEEK_MODEL:-deepseek-v4-flash}"
          if [ -n "${DEEPSEEK_API_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"
          fi
          if [ -n "${MIMO_API_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" MIMO_API_KEY="$MIMO_API_KEY"
          fi
          if [ -n "${MIMO_BASE_URL:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" MIMO_BASE_URL="$MIMO_BASE_URL"
          fi
          if [ -n "${MIMO_PAYG_API_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" MIMO_PAYG_API_KEY="$MIMO_PAYG_API_KEY"
          fi
          if [ -n "${MIMO_TOKEN_PLAN_API_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" MIMO_TOKEN_PLAN_API_KEY="$MIMO_TOKEN_PLAN_API_KEY"
          fi
          if [ -n "${R2_ENDPOINT:-}" ] && [ -n "${R2_BUCKET:-}" ] && [ -n "${R2_ACCESS_KEY_ID:-}" ] && [ -n "${R2_SECRET_ACCESS_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" \
              R2_ENDPOINT="$R2_ENDPOINT" \
              R2_BUCKET="$R2_BUCKET" \
              R2_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
              R2_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          fi
          if [ -n "${AI_ASSISTANT_ACCESS_CODE:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" AI_ASSISTANT_ACCESS_CODE="$AI_ASSISTANT_ACCESS_CODE"
          fi
          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          fi
      - name: Deploy reminder function
        run: supabase functions deploy send-reminders --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Deploy AI assistant function
        run: supabase functions deploy ai-assistant --project-ref "$PROJECT_REF"

      - name: Configure R2 CORS and lifecycle
        continue-on-error: true
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "${R2_ENDPOINT:-}" ] || [ -z "${R2_BUCKET:-}" ] || [ -z "${R2_ACCESS_KEY_ID:-}" ] || [ -z "${R2_SECRET_ACCESS_KEY:-}" ]; then
            echo "R2 secrets missing; skip CORS/lifecycle configure"
            exit 0
          fi
          npm install --no-save @aws-sdk/client-s3@^3.1089.0
          # Object-only R2 tokens return 403 on PutBucketCors/PutBucketLifecycle; do not block function deploys.
          if ! npm run configure:r2; then
            echo "::warning::R2 CORS/lifecycle configure failed (often AccessDenied on object-only API tokens). Set ai-audio/ lifecycle to 7 days in the Cloudflare dashboard if needed."
            exit 1
          fi

      - name: Deploy admin function
        run: supabase functions deploy admin --project-ref "$PROJECT_REF"

      - name: Deploy static app hosting function
        run: supabase functions deploy app-hosting --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Configure database cron
        env:
          MIGRATION_FILE: supabase/migrations/20260706_schedule_reminder_edge_function.sql
        run: |
          jq -Rs '{query: .}' "$MIGRATION_FILE" > /tmp/reminder-cron-query.json
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/reminder-cron-query.json

      - name: Apply reminder retry migration
        env:
          MIGRATION_FILE: supabase/migrations/20260713_reminder_retry.sql
        run: |
          jq -Rs '{query: .}' "$MIGRATION_FILE" > /tmp/reminder-retry-query.json
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/reminder-retry-query.json

      - name: Verify function responds
        run: |
          response="$(curl --fail-with-body \
            --request POST \
            --url "https://$PROJECT_REF.supabase.co/functions/v1/send-reminders" \
            --header "apikey: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{"source":"deployment-check"}')"
          echo "$response"

      - name: Verify cron runs automatically
        run: |
          sleep 70
          query="select job.jobname, job.schedule, job.active, run.status, run.return_message, run.start_time, run.end_time,
            response.status_code as function_status_code, response.error_msg as function_error, response.content as function_response
          from cron.job as job
          left join lateral (
            select status, return_message, start_time, end_time
            from cron.job_run_details
            where jobid = job.jobid
            order by start_time desc
            limit 1
          ) as run on true
          left join lateral (
            select status_code, error_msg, content
            from net._http_response
            order by created desc
            limit 1
          ) as response on true
          where job.jobname = 'dispatch-schedule-reminders';"
          jq -n --arg query "$query" '{query: $query}' > /tmp/reminder-cron-status.json
          response="$(curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/reminder-cron-status.json)"
          echo "$response"
          echo "$response" | jq -e '
            length == 1
            and .[0].active == true
            and (.[0].status == "succeeded" or .[0].status == "running")
            and .[0].function_status_code == 200
            and .[0].function_error == null
          '
