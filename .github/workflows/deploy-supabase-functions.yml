name: Deploy Supabase functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-functions.yml"

permissions:
  contents: read

concurrency:
  group: supabase-functions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: haifsnaupqhlvgfoyvlc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Configure function secrets
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          AI_ASSISTANT_ACCESS_CODE: ${{ secrets.AI_ASSISTANT_ACCESS_CODE }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT: ${{ vars.AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT || '3' }}
          AI_ASSISTANT_ACCESS_CODE_MONTHLY_LIMIT: ${{ vars.AI_ASSISTANT_ACCESS_CODE_MONTHLY_LIMIT || '20' }}
          AI_ASSISTANT_MEMBER_DAILY_LIMIT: ${{ vars.AI_ASSISTANT_MEMBER_DAILY_LIMIT || '50' }}
          AI_ASSISTANT_MEMBER_MONTHLY_LIMIT: ${{ vars.AI_ASSISTANT_MEMBER_MONTHLY_LIMIT || '800' }}
          AI_ASSISTANT_ADMIN_DAILY_LIMIT: ${{ vars.AI_ASSISTANT_ADMIN_DAILY_LIMIT || '200' }}
          AI_ASSISTANT_ADMIN_MONTHLY_LIMIT: ${{ vars.AI_ASSISTANT_ADMIN_MONTHLY_LIMIT || '3000' }}
        run: |
          supabase secrets set --project-ref "$PROJECT_REF" \
            REMINDER_DISPATCHER_TOKEN="${{ secrets.REMINDER_DISPATCHER_TOKEN }}" \
            VAPID_PUBLIC_KEY="${{ vars.VITE_VAPID_PUBLIC_KEY }}" \
            VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}" \
            APP_URL="https://shallower-yin.github.io/semester-schedule-pwa/" \
            AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT="$AI_ASSISTANT_ACCESS_CODE_DAILY_LIMIT" \
            AI_ASSISTANT_ACCESS_CODE_MONTHLY_LIMIT="$AI_ASSISTANT_ACCESS_CODE_MONTHLY_LIMIT" \
            AI_ASSISTANT_MEMBER_DAILY_LIMIT="$AI_ASSISTANT_MEMBER_DAILY_LIMIT" \
            AI_ASSISTANT_MEMBER_MONTHLY_LIMIT="$AI_ASSISTANT_MEMBER_MONTHLY_LIMIT" \
            AI_ASSISTANT_ADMIN_DAILY_LIMIT="$AI_ASSISTANT_ADMIN_DAILY_LIMIT" \
            AI_ASSISTANT_ADMIN_MONTHLY_LIMIT="$AI_ASSISTANT_ADMIN_MONTHLY_LIMIT"
          supabase secrets set --project-ref "$PROJECT_REF" DEEPSEEK_MODEL="${DEEPSEEK_MODEL:-deepseek-v4-flash}"
          if [ -n "${DEEPSEEK_API_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"
          fi
          if [ -n "${AI_ASSISTANT_ACCESS_CODE:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" AI_ASSISTANT_ACCESS_CODE="$AI_ASSISTANT_ACCESS_CODE"
          fi
          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            supabase secrets set --project-ref "$PROJECT_REF" SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          fi
      - name: Deploy reminder function
        run: supabase functions deploy send-reminders --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Deploy AI assistant function
        run: supabase functions deploy ai-assistant --project-ref "$PROJECT_REF"

      - name: Deploy admin function
        run: supabase functions deploy admin --project-ref "$PROJECT_REF"

      - name: Configure database cron
        env:
          MIGRATION_FILE: supabase/migrations/20260706_schedule_reminder_edge_function.sql
        run: |
          jq -Rs '{query: .}' "$MIGRATION_FILE" > /tmp/reminder-cron-query.json
          curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/reminder-cron-query.json

      - name: Verify function responds
        run: |
          response="$(curl --fail-with-body \
            --request POST \
            --url "https://$PROJECT_REF.supabase.co/functions/v1/send-reminders" \
            --header "apikey: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            --header "Content-Type: application/json" \
            --data '{"source":"deployment-check"}')"
          echo "$response"

      - name: Verify cron runs automatically
        run: |
          sleep 70
          query="select job.jobname, job.schedule, job.active, run.status, run.return_message, run.start_time, run.end_time,
            response.status_code as function_status_code, response.error_msg as function_error, response.content as function_response
          from cron.job as job
          left join lateral (
            select status, return_message, start_time, end_time
            from cron.job_run_details
            where jobid = job.jobid
            order by start_time desc
            limit 1
          ) as run on true
          left join lateral (
            select status_code, error_msg, content
            from net._http_response
            order by created desc
            limit 1
          ) as response on true
          where job.jobname = 'dispatch-schedule-reminders';"
          jq -n --arg query "$query" '{query: $query}' > /tmp/reminder-cron-status.json
          response="$(curl --fail-with-body \
            --request POST \
            --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
            --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data @/tmp/reminder-cron-status.json)"
          echo "$response"
          echo "$response" | jq -e '
            length == 1
            and .[0].active == true
            and .[0].status == "succeeded"
            and .[0].function_status_code == 200
            and .[0].function_error == null
          '
