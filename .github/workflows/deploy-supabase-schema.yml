name: Deploy Supabase schema

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/schema.sql"
      - ".github/workflows/deploy-supabase-schema.yml"

permissions:
  contents: read

concurrency:
  group: supabase-schema
  cancel-in-progress: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: haifsnaupqhlvgfoyvlc
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run migrations through Management API
        run: |
          set -euo pipefail
          for file in $(find supabase/migrations -maxdepth 1 -name '*.sql' | sort); do
            echo "Running $file"
            jq -Rs '{query: .}' "$file" > /tmp/supabase-migration.json
            curl --fail-with-body \
              --request POST \
              --url "https://api.supabase.com/v1/projects/$PROJECT_REF/database/query" \
              --header "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              --header "Content-Type: application/json" \
              --data @/tmp/supabase-migration.json
          done
