<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3157d5" />
    <meta name="description" content="本地优先、可离线使用的日程计划表" />
    <link rel="icon" href="%BASE_URL%favicon.svg" />
    <title>日程计划表</title>
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener("beforeinstallprompt", function (event) {
        event.preventDefault();
        window.__pwaInstallPrompt = event;
        window.dispatchEvent(new Event("pwa-install-available"));
      });
      window.addEventListener("appinstalled", function () {
        window.__pwaInstallPrompt = null;
      });
      // Recover from broken offline updates (white screen after mixed cache / wrong base path).
      (function () {
        var KEY = "semester-schedule-boot-recover-count";
        var attempts = Number(sessionStorage.getItem(KEY) || "0");
        function showBanner(text) {
          try {
            var existing = document.getElementById("boot-recover-banner");
            if (existing) {
              existing.textContent = text;
              return;
            }
            var banner = document.createElement("div");
            banner.id = "boot-recover-banner";
            banner.setAttribute("role", "status");
            banner.style.cssText = "position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:24px;background:#f7f8fc;color:#172033;font:600 15px/1.5 system-ui,sans-serif;text-align:center;";
            banner.textContent = text;
            document.body.appendChild(banner);
          } catch (_) {}
        }
        function recover(force) {
          if (!force && attempts >= 2) {
            showBanner("应用加载失败。请关闭后重新打开，或清除本站数据后再试。");
            return;
          }
          if (!force && attempts >= 1 && /[?&](recovered|reload)=/.test(location.search)) {
            // Already tried once this session; wait for second empty-root pass.
          }
          attempts += 1;
          sessionStorage.setItem(KEY, String(attempts));
          showBanner("检测到页面异常，正在清理缓存并重新加载…");
          var done = function () {
            var url = location.pathname + "?recovered=" + Date.now() + location.hash;
            location.replace(url);
          };
          var clearCaches = function () {
            if (!("caches" in window)) return Promise.resolve();
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            });
          };
          var clearWorkers = function () {
            if (!("serviceWorker" in navigator)) return Promise.resolve();
            return navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
            });
          };
          Promise.resolve().then(clearWorkers).then(clearCaches).then(done, done);
        }
        window.addEventListener("error", function (event) {
          var target = event && event.target;
          if (target && (target.tagName === "SCRIPT" || target.tagName === "LINK")) recover(false);
        }, true);
        // Faster first check — offline-update white screens should not wait 10s.
        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (root && !root.childElementCount) recover(false);
        }, 3500);
        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (root && !root.childElementCount) recover(true);
        }, 12000);
        // Successful boot: reset counter so future updates can recover again.
        window.addEventListener("load", function () {
          window.setTimeout(function () {
            var root = document.getElementById("root");
            if (root && root.childElementCount) {
              try { sessionStorage.removeItem(KEY); } catch (_) {}
              var banner = document.getElementById("boot-recover-banner");
              if (banner && banner.parentNode) banner.parentNode.removeChild(banner);
            }
          }, 800);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
